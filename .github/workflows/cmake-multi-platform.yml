name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ "master" ]
  workflow_call:
    secrets:
      envPAT:
        required: true
    outputs:
      project-version:
        description: "Project version described in CMakeLists.txt"
        value: ${{ jobs.build-test-pack.outputs.project-version }}

permissions:
  # deployments permission to deploy GitHub pages website
  deployments: write
  # contents permission to update benchmark contents in gh-pages branch
  contents: write

jobs:
  build-test-pack:
    runs-on: ${{ matrix.os }}
    outputs:
      project-version: ${{ steps.get-project-version.outputs.project-version }}


    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-24.04, windows-2022]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-2022
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-24.04
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-24.04
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-2022
            c_compiler: gcc
          - os: windows-2022
            c_compiler: clang
          - os: ubuntu-24.04
            c_compiler: cl

    steps:
    - uses: actions/checkout@v3

    - name: Install Ubuntu dependencies
      if: ${{ matrix.os == 'ubuntu-24.04' }}
      shell: bash
      run: |
        sudo update-alternatives --remove-all gcc || true
        sudo update-alternatives --remove-all g++ || true
        sudo update-alternatives --remove-all clang || true
        sudo update-alternatives --remove-all clang++ || true
        sudo apt update
        sudo apt install -y \
          gcc-14 \
          g++-14 \
          clang-20 \
          glslc \
          libstdc++-14-dev \
          libtbb-dev \
          libvulkan-dev \
          libglm-dev \
          libfreetype-dev \
          libglfw3-dev \
          libsdl2-dev
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100

    - name: Install Windows dependencies
      if: ${{ matrix.os == 'windows-2022' }}
      shell: bash
      run: |
        vcpkg install \
          vulkan-sdk-components \
          freetype \
          sdl2 \
          glfw3 \
          glm

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        if [ "${{ matrix.os }}" == "windows-2022" ]; then
          echo "toolchain-file=${VCPKG_INSTALLATION_ROOT}\scripts\buildsystems\vcpkg.cmake" >> "$GITHUB_OUTPUT"
        else
          echo "toolchain-file=" >> "$GITHUB_OUTPUT"
        fi
        echo "GITHUB_OUTPUT: $GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=${{ steps.strings.outputs.toolchain-file }}
        -DCMAKE_VERBOSE_MAKEFILE=ON
        -S ${{ github.workspace }}

    - name: Retrieve project version from CMakeLists.txt
      id: get-project-version
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      shell: bash
      run: |
        echo "project-version=$(cmake --system-information | awk -F= '$1~/CMAKE_PROJECT_VERSION:STATIC/{print$2}')" >> "$GITHUB_OUTPUT"

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Check benchmarks existence
      id: check-benchmarks
      uses: andstor/file-existence-action@v2
      with:
        files: ${{ steps.strings.outputs.build-output-dir }}/benchmarks/badger_engine_benchmarks

    - name: Benchmark
      id: benchmark
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      if: steps.check-benchmarks.outputs.files_exists == 'true' && matrix.build_type == 'Release'
      shell: bash
      run: |
        ./benchmarks/badger_engine_benchmarks --benchmark_format=json > benchmark_result.json
        echo "benchmarks-enabled=true" >> "$GITHUB_OUTPUT"

    - name: Store benchmark result
      if: steps.check-benchmarks.outputs.files_exists == 'true' && matrix.build_type == 'Release' && matrix.c_compiler == 'clang' && github.ref == 'refs/heads/master'
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'googlecpp'
        output-file-path: ${{ steps.strings.outputs.build-output-dir }}/benchmark_result.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true

    - name: Pack
      if: ${{ matrix.build_type == 'Release' }}
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: cpack

    - name: Upload artifacts
      if: ${{ matrix.build_type == 'Release' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}.${{ matrix.c_compiler }}.${{ matrix.build_type }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/libbadger_engine*.deb
          ${{ steps.strings.outputs.build-output-dir }}/libbadger_engine*.zip
          ${{ steps.strings.outputs.build-output-dir }}/libbadger_engine*.sh
